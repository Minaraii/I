<!DOCTYPE html>
<html lang="es">
    <head>
        <!-- Define codificación de caracteres (acentos, ñ, etc.) -->
        <meta charset="UTF-8">

        <!-- Hace que la web sea responsive (se adapte a móvil, tablet, etc.) -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
        <!-- Título que aparece en la pestaña del navegador -->
        <title>HÁBITOS</title>

         <!-- Enlace al archivo de estilos CSS externo -->
        <link rel="stylesheet" href="/css/habitos.css">
    </head>

<!--BODY-->

<body>
    <!-- btn-back-->
      <a href="/index.html" class="back-btn">←</a>

    <!-- Canvas usado normalmente para animaciones (en este caso probablemente estrellas o fondo dinámico) -->
     <canvas id="stars"></canvas>

    <!-- Capa de fondo visual (puede ser gradiente o efecto visual en CSS) -->
    <div class="fondo"></div>

    <!-- Encabezado principal de la app -->
    <header class="header">
        <!-- Titulo principal -->
         <h1>HÁBITOS</h1>

        <!-- Subtítulo motivacional -->
        <p>Crea tu mejor versión</p>
    </header>
    
    <!-- Contenedor principal del centro de la pantalla -->
    <main class="centro">

        <!-- contenedor del reloj -->
        <div class="relok-container">

        <!-- Elemento donde se mostrará la hora dinámica (JS lo actualiza) -->
        <div class="reloj" id="time">00:00:00</div>

        </div>

        <!-- Botón principal para iniciar acción (ej: iniciar timer o hábito) -->
        <button class="btn" id="startBtn">COMENZAR</button>
    
    </main>

    <!-- Sección de tarjetas informativas -->
    <div class="cards">

        <!-- Tarjeta 1: tiempo -->
        <div class="card">⏱ TIEMPO</div>

        <!-- Tarjeta 2: Habitos -->
        <div class="card">✿ HÁBITO</div>

        <!-- Tarjeta 3: progreso -->
        <div class="card">📈 PROGRESO</div>
    </div>

    <!-- Enlace al archivo JavaScript donde vive la lógica de la app -->
    <script src="/js/habitos.js"></script>

</body>
</html>
