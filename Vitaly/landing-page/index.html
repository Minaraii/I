<!DOCTYPE html>

<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Vitaly</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>
<!--HEADER-->
  <header>
    <!-- Hero principal-->
     <section class="header" id="inicio">
        <div class="header-text">
            <h1 class="header-title">Vitaly</h1>
            <p class="header-subtitle">Life Present</p>
        </div>
     </section>
  </header>

  <!-- HERO -->

  <section class="hero">
  <div class="hero-content">
    <h1 class="hero-title">Eleva tu energía diaria</h1>
    
    <p class="hero-subtitle">
      Descubre cómo la comida impacta tu enfoque, mente y rendimiento
    </p>
    
    <button class="hero-btn" onclick="scrollToApp()">
      Empezar
    </button>
  </div>
</section>

  <!-- FEATURES -->

  <section class="features">

  <div class="card">
    <h3>⚡ Energía</h3>
    <p>Identifica qué comidas te potencian.</p>
  </div>

  <div class="card">
    <h3>🧠 Enfoque</h3>
    <p>Mejora tu rendimiento mental.</p>
  </div>

  <div class="card">
    <h3>📊 Control</h3>
    <p>Registra y analiza cómo te sientes.</p>
  </div>

</section>

  </section>

  <!-- APP -->

  <section class="app" id="app">
    <h2>Tu registro</h2>


<input type="text" id="name" placeholder="Nombre de la receta">
<textarea id="ingredients" placeholder="Ingredientes"></textarea>
<textarea id="steps" placeholder="Preparación"></textarea>

<button onclick="saveRecipe()">Guardar receta</button>

<div id="recipes"></div>


  </section>

  <script src="app.js"></script>

</body>
</html>
