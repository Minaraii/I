<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nutrition Pro</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- 🔥 Panel RDA -->
  <div class="rda-panel">
    <h4>📊 Recomendado</h4>
    <p>🔥 Cal: 2000 kcal</p>
    <p>💪 Prot: 50g</p>
    <p>🍞 Carbs: 275g</p>
    <p>🥑 Grasas: 70g</p>
    <p>🐟 Omega 3: 1.6g</p>
    <p>🧬 B12: 2.4mcg</p>
  </div>

  <header>
    <h1>Nutrition Pro</h1>
    <p>Control total. Cuerpo disciplinado.</p>
  </header>

  <section class="card">
    <h2>Registrar Día</h2>

    <input id="calories" type="number" placeholder="🔥 Calorías">
    <input id="protein" type="number" placeholder="💪 Proteína">
    <input id="carbs" type="number" placeholder="🍞 Carbs">
    <input id="fat" type="number" placeholder="🥑 Grasas">

    <div id="customFields"></div>

    <div class="add-field">
      <input id="newField" type="text" placeholder="Añadir nutriente (Ej: Zinc)">
      <button onclick="addField()">+</button>
    </div>

    <button onclick="saveDay()">Guardar</button>
  </section>

  <section class="card">
    <h2>Resumen</h2>
    <div id="summary"></div>
  </section>

  <section class="card">
    <h2>Historial</h2>
    <div id="stats"></div>
  </section>

</div>

<script>
let customFields = JSON.parse(localStorage.getItem('customFields')) || [];

function addField() {
  const input = document.getElementById('newField');
  const name = input.value.trim();

  if (!name || customFields.includes(name)) return;

  customFields.push(name);
  localStorage.setItem('customFields', JSON.stringify(customFields));

  input.value = "";
  renderFields();
}

function removeField(name) {
  customFields = customFields.filter(f => f !== name);
  localStorage.setItem('customFields', JSON.stringify(customFields));
  renderFields();
}

function renderFields() {
  const container = document.getElementById('customFields');

  container.innerHTML = customFields.map(f => `
    <div class="field-row">
      <input type="number" id="field_${f}" placeholder="${f}">
      <span class="delete" onclick="removeField('${f}')">✕</span>
    </div>
  `).join('');
}

function saveDay() {
  const now = new Date();

  const entry = {
    id: Date.now(),
    date: now.toISOString(),
    calories: +document.getElementById('calories').value || 0,
    protein: +document.getElementById('protein').value || 0,
    carbs: +document.getElementById('carbs').value || 0,
    fat: +document.getElementById('fat').value || 0,
    extra: {}
  };

  customFields.forEach(f => {
    entry.extra[f] = +document.getElementById('field_' + f)?.value || 0;
  });

  let data = JSON.parse(localStorage.getItem('nutritionPro')) || [];
  data.push(entry);

  localStorage.setItem('nutritionPro', JSON.stringify(data));

  render();
}

function deleteEntry(id) {
  let data = JSON.parse(localStorage.getItem('nutritionPro')) || [];
  data = data.filter(d => d.id !== id);

  localStorage.setItem('nutritionPro', JSON.stringify(data));

  render();
}

function formatDate(dateStr) {
  return new Date(dateStr).toLocaleDateString();
}

function groupStats(data) {
  const now = new Date();
  let day=0, week=0, month=0, year=0;

  data.forEach(d=>{
    const date = new Date(d.date);

    if (date.toDateString() === now.toDateString()) day+=d.calories;
    if ((now - date) <= 7*86400000) week+=d.calories;

    if (date.getMonth()===now.getMonth() && date.getFullYear()===now.getFullYear())
      month+=d.calories;

    if (date.getFullYear()===now.getFullYear())
      year+=d.calories;
  });

  return {day,week,month,year};
}

function render() {
  let data = JSON.parse(localStorage.getItem('nutritionPro')) || [];
  const stats = groupStats(data);

  document.getElementById('summary').innerHTML = `
    <div class="summary">Hoy: ${stats.day} kcal</div>
    <div class="summary">Semana: ${stats.week}</div>
    <div class="summary">Mes: ${stats.month}</div>
    <div class="summary">Año: ${stats.year}</div>
  `;

  document.getElementById('stats').innerHTML = data.map(d=>{
    const extras = Object.entries(d.extra||{})
      .map(([k,v])=>`${k}: ${v}`).join(" • ");

    return `
      <div class="log">
        <div class="top">
          ${formatDate(d.date)}
          <span class="delete" onclick="deleteEntry(${d.id})">✕</span>
        </div>

        <div class="main">
          🔥 ${d.calories} | 💪 ${d.protein} | 🍞 ${d.carbs} | 🥑 ${d.fat}
        </div>

        <div class="extra">${extras}</div>
      </div>
    `;
  }).join('');
}

renderFields();
render();
</script>

</body>
</html>
