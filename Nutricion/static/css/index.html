<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nutrition Pro</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <!-- 🔥 PANEL RDA BIEN HECHO -->
<div class="rda-panel">
  <h4>📊 Recomendado</h4>

  <p>🔥 Cal: <span id="rda-cal">2000</span> kcal</p>
  <p>💪 Prot: <span id="rda-prot">50</span> g</p>
  <p>🍞 Carbs: <span id="rda-carb">275</span> g</p>
  <p>🥑 Grasas: <span id="rda-fat">70</span> g</p>
  <p>🐟 Omega 3: <span id="rda-omega">1.6</span> g</p>
  <p>🧬 B12: <span id="rda-b12">2.4</span> mcg</p>
</div>

<!-- CONFIG -->
<section class="card">
  <h2>⚙️ Configuración</h2>

  <input id="weight" type="number" placeholder="Peso (kg)">

  <select id="goal">
    <option value="maintain">Mantener</option>
    <option value="cut">Bajar grasa</option>
    <option value="bulk">Ganar músculo</option>
  </select>

  <select id="activity">
    <option value="1.2">Sedentario</option>
    <option value="1.4">Ligero</option>
    <option value="1.6">Moderado</option>
    <option value="1.8">Activo</option>
  </select>

  <button onclick="calculatePlan()">Calcular</button>

  <div id="planResult" class="plan-box"></div>
</section>

  <section class="card">
    <h2>Registrar Día</h2>

    <input id="calories" type="number" placeholder="🔥 Calorías">
    <input id="protein" type="number" placeholder="💪 Proteína">
    <input id="carbs" type="number" placeholder="🍞 Carbs">
    <input id="fat" type="number" placeholder="🥑 Grasas">

    <div id="customFields"></div>

    <div class="add-field">
      <input id="newField" type="text" placeholder="Añadir nutriente (Ej: Zinc)">
      <button onclick="addField()">+</button>
    </div>

    <button onclick="saveDay()">Guardar</button>
  </section>

  <section class="card">
    <h2>Resumen</h2>
    <div id="summary"></div>
  </section>

  <section class="card">
    <h2>Historial</h2>
    <div id="stats"></div>
  </section>

</div>

<script>
let customFields = JSON.parse(localStorage.getItem('customFields')) || [];

function addField() {
  const input = document.getElementById('newField');
  const name = input.value.trim();

  if (!name || customFields.includes(name)) return;

  customFields.push(name);
  localStorage.setItem('customFields', JSON.stringify(customFields));

  input.value = "";
  renderFields();
}

function removeField(name) {
  customFields = customFields.filter(f => f !== name);
  localStorage.setItem('customFields', JSON.stringify(customFields));
  renderFields();
}

function renderFields() {
  const container = document.getElementById('customFields');

  container.innerHTML = customFields.map(f => `
    <div class="field-row">
      <input type="number" id="field_${f}" placeholder="${f}">
      <span class="delete" onclick="removeField('${f}')">✕</span>
    </div>
  `).join('');
}

function saveDay() {
  const now = new Date();

  const entry = {
    id: Date.now(),
    date: now.toISOString(),
    calories: +document.getElementById('calories').value || 0,
    protein: +document.getElementById('protein').value || 0,
    carbs: +document.getElementById('carbs').value || 0,
    fat: +document.getElementById('fat').value || 0,
    extra: {}
  };

  customFields.forEach(f => {
    entry.extra[f] = +document.getElementById('field_' + f)?.value || 0;
  });

  let data = JSON.parse(localStorage.getItem('nutritionPro')) || [];
  data.push(entry);

  localStorage.setItem('nutritionPro', JSON.stringify(data));

  render();
}

function deleteEntry(id) {
  let data = JSON.parse(localStorage.getItem('nutritionPro')) || [];
  data = data.filter(d => d.id !== id);

  localStorage.setItem('nutritionPro', JSON.stringify(data));

  render();
}

function formatDate(dateStr) {
  return new Date(dateStr).toLocaleDateString();
}

function groupStats(data) {
  const now = new Date();
  let day=0, week=0, month=0, year=0;

  data.forEach(d=>{
    const date = new Date(d.date);

    if (date.toDateString() === now.toDateString()) day+=d.calories;
    if ((now - date) <= 7*86400000) week+=d.calories;

    if (date.getMonth()===now.getMonth() && date.getFullYear()===now.getFullYear())
      month+=d.calories;

    if (date.getFullYear()===now.getFullYear())
      year+=d.calories;
  });

  return {day,week,month,year};
}

function render() {
  let data = JSON.parse(localStorage.getItem('nutritionPro')) || [];
  const stats = groupStats(data);

  document.getElementById('summary').innerHTML = `
    <div class="summary">Hoy: ${stats.day} kcal</div>
    <div class="summary">Semana: ${stats.week}</div>
    <div class="summary">Mes: ${stats.month}</div>
    <div class="summary">Año: ${stats.year}</div>
  `;

  document.getElementById('stats').innerHTML = data.map(d=>{
    const extras = Object.entries(d.extra||{})
      .map(([k,v])=>`${k}: ${v}`).join(" • ");

    return `
      <div class="log">
        <div class="top">
          ${formatDate(d.date)}
          <span class="delete" onclick="deleteEntry(${d.id})">✕</span>
        </div>

        <div class="main">
          🔥 ${d.calories} | 💪 ${d.protein} | 🍞 ${d.carbs} | 🥑 ${d.fat}
        </div>

        <div class="extra">${extras}</div>
      </div>
    `;
  }).join('');
}

renderFields();
render();

function calculatePlan() {
  const weight = +document.getElementById('weight').value;
  const goal = document.getElementById('goal').value;
  const activity = +document.getElementById('activity').value;

  if (!weight) return;

  // 🔥 Calorías base (simple y efectivo)
  let calories = weight * 22 * activity;

  // Ajuste según objetivo
  if (goal === "cut") calories -= 300;
  if (goal === "bulk") calories += 300;

  // 💪 Proteína ideal
  let protein = weight * 1.8;

  // Guardar en localStorage
  const plan = { calories, protein };
  localStorage.setItem('nutritionPlan', JSON.stringify(plan));

  renderPlan();
}

function renderPlan() {
  const plan = JSON.parse(localStorage.getItem('nutritionPlan'));
  if (!plan) return;

  document.getElementById('planResult').innerHTML = `
    <div class="plan-box">
      🔥 Calorías objetivo: <b>${Math.round(plan.calories)}</b><br>
      💪 Proteína ideal: <b>${Math.round(plan.protein)}g</b>
    </div>
  `;

  // 🔥 valores base seguros
const baseRDA = {
  cal: 2000,
  prot: 50,
  carb: 275,
  fat: 70,
  omega: 1.6,
  b12: 2.4
};

let resetTimer;

// 🔥 actualizar panel (NO rompe diseño)
function updateRDA(data){
  document.getElementById("rda-cal").textContent = Math.round(data.cal);
  document.getElementById("rda-prot").textContent = Math.round(data.prot);
  document.getElementById("rda-carb").textContent = Math.round(data.carb);
  document.getElementById("rda-fat").textContent = Math.round(data.fat);
  document.getElementById("rda-omega").textContent = data.omega.toFixed(1);
  document.getElementById("rda-b12").textContent = data.b12;
}

// 🔥 reset automático
function resetRDA(){
  updateRDA(baseRDA);
}

// 🔥 función principal PRO
function calculatePlan(){

  const weight = +document.getElementById("weight").value;
  const goal = document.getElementById("goal").value;
  const activity = +document.getElementById("activity").value;

  if(!weight){
    alert("Ingresa tu peso");
    return;
  }

  // 🔥 calorías base
  let calories = weight * 22 * activity;

  // 🔥 ajuste objetivo
  if(goal === "cut") calories -= 400;
  if(goal === "bulk") calories += 400;

  // 🔥 proteína (2g/kg)
  let protein = weight * 2;

  // 🔥 grasas (25% calorías)
  let fat = (calories * 0.25) / 9;

  // 🔥 carbs (restante)
  let carbs = (calories - (protein * 4 + fat * 9)) / 4;

  // 🔥 omega 3
  let omega = weight * 0.02;

  // 🔥 b12 estándar
  let b12 = 2.4;

  const result = {
    cal: calories,
    prot: protein,
    carb: carbs,
    fat: fat,
    omega: omega,
    b12: b12
  };

  // 🔥 guardar plan
  localStorage.setItem("nutritionPlan", JSON.stringify(result));

  // 🔥 mostrar resultado bonito
  document.getElementById("planResult").innerHTML = `
    <div>
      🔥 <b>${Math.round(calories)}</b> kcal<br>
      💪 <b>${Math.round(protein)}g</b> proteína<br>
      🍞 <b>${Math.round(carbs)}g</b> carbs<br>
      🥑 <b>${Math.round(fat)}g</b> grasas
    </div>
  `;

  // 🔥 actualizar panel
  updateRDA(result);

  // 🔥 reset automático (30s)
  clearTimeout(resetTimer);
  resetTimer = setTimeout(resetRDA, 30000);
}


// 🔥 cargar plan al iniciar
function loadSavedPlan(){
  const saved = JSON.parse(localStorage.getItem("nutritionPlan"));
  if(saved){
    updateRDA(saved);
  }
}

loadSavedPlan();
}

// cargar al inicio
renderPlan();

// 🔥 valores base (default)
const baseValues = {
  cal: 2000,
  prot: 50,
  carb: 275,
  fat: 70,
  omega: 1.6,
  b12: 2.4
};

let resetTimer;

// 🔥 función principal
function calcularPlan(){

  const peso = parseFloat(document.getElementById("peso").value);
  const objetivo = document.getElementById("objetivo").value;
  const actividad = parseFloat(document.getElementById("actividad").value);

  if(!peso){
    alert("Ingresa tu peso bro");
    return;
  }

  // 🔥 calorías base (Mifflin simplificado)
  let calorias = peso * 22 * actividad;

  // 🔥 ajuste por objetivo
  if(objetivo === "bajar") calorias -= 400;
  if(objetivo === "subir") calorias += 400;

  // 🔥 proteína
  let proteina = peso * 2; // 2g/kg estándar fitness

  // 🔥 grasas (25% calorías)
  let grasas = (calorias * 0.25) / 9;

  // 🔥 carbs (resto)
  let carbs = (calorias - (proteina * 4 + grasas * 9)) / 4;

  // 🔥 omega 3 (por peso)
  let omega = peso * 0.02; // ~0.02g/kg

  // 🔥 B12 fija (segura estándar)
  let b12 = 2.4;

  // 🔥 actualizar UI
  updateRDA(calorias, proteina, carbs, grasas, omega, b12);

  // 🔥 reset automático
  clearTimeout(resetTimer);
  resetTimer = setTimeout(resetRDA, 30000);
}


// 🔥 actualizar valores en pantalla
function updateRDA(cal, prot, carb, fat, omega, b12){
  document.getElementById("rda-cal").textContent = Math.round(cal);
  document.getElementById("rda-prot").textContent = Math.round(prot);
  document.getElementById("rda-carb").textContent = Math.round(carb);
  document.getElementById("rda-fat").textContent = Math.round(fat);
  document.getElementById("rda-omega").textContent = omega.toFixed(1);
  document.getElementById("rda-b12").textContent = b12;
}


// 🔥 volver a valores base
function resetRDA(){
  updateRDA(
    baseValues.cal,
    baseValues.prot,
    baseValues.carb,
    baseValues.fat,
    baseValues.omega,
    baseValues.b12
  );
}
</script>

</body>
</html>
