<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Desintoxicación Perfecta • 100 Días</title>

<style>

/* =========================
   RESET
========================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
}

/* =========================
   BODY
========================= */

body{
  font-family:Arial, Helvetica, sans-serif;
  overflow:hidden;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#020617;
  transition:background 1s ease;
}

/* =========================
   FONDO ANIMADO
========================= */

.background{
  position:fixed;
  inset:0;
  z-index:-5;
  overflow:hidden;
}

.gradient{
  position:absolute;
  inset:0;
  background:
  radial-gradient(circle at top,#1d4ed8 0%,#020617 55%),
  linear-gradient(to bottom,#020617,#000);
}

/* Glow principal */

.glow{
  position:absolute;
  width:700px;
  height:700px;
  border-radius:50%;
  background:#2563eb;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  filter:blur(180px);
  opacity:.25;
  animation:pulse 8s ease-in-out infinite;
}

/* Glow secundario */

.glow2{
  position:absolute;
  width:400px;
  height:400px;
  border-radius:50%;
  background:#38bdf8;
  bottom:-100px;
  right:-100px;
  filter:blur(140px);
  opacity:.18;
  animation:float 10s infinite ease-in-out;
}

/* Partículas */

.particle{
  position:absolute;
  width:3px;
  height:3px;
  border-radius:50%;
  background:white;
  opacity:.35;
  animation:stars linear infinite;
}

@keyframes stars{
  from{
    transform:translateY(0px);
  }
  to{
    transform:translateY(-1200px);
  }
}

@keyframes pulse{
  0%,100%{
    transform:translate(-50%,-50%) scale(1);
  }

  50%{
    transform:translate(-50%,-50%) scale(1.15);
  }
}

@keyframes float{
  0%,100%{
    transform:translateY(0px);
  }

  50%{
    transform:translateY(-40px);
  }
}

/* =========================
   CONTENEDOR
========================= */

.container{
  width:92%;
  max-width:1200px;
  padding:45px;
  border-radius:35px;

  background:rgba(255,255,255,.05);

  border:1px solid rgba(255,255,255,.08);

  backdrop-filter:blur(18px);

  box-shadow:
  0 0 40px rgba(37,99,235,.2),
  inset 0 0 30px rgba(255,255,255,.03);

  text-align:center;
}

/* =========================
   TITULO
========================= */

h1{
   font-size:clamp(2rem,5vw,5rem);

  background:linear-gradient(
    to right,
    #fff,
    #60a5fa,
    #fff
  );

  background-clip:text;
  -webkit-background-clip:text;

  color:transparent;
}

/* =========================
   RELOJ
========================= */

.timer{
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
}

.box{
  min-width:180px;

  padding:30px 20px;

  border-radius:28px;

  background:rgba(255,255,255,.04);

  border:1px solid rgba(255,255,255,.08);

  position:relative;

  overflow:hidden;

  transition:.3s;
}

.box:hover{
  transform:translateY(-8px);
  box-shadow:0 0 30px rgba(96,165,250,.25);
}

.box::before{
  content:"";

  position:absolute;

  width:200%;

  height:100%;

  background:linear-gradient(
  90deg,
  transparent,
  rgba(255,255,255,.08),
  transparent
  );

  top:0;
  left:-200%;

  animation:shine 6s infinite;
}

@keyframes shine{

  100%{
    left:200%;
  }

}

.number{
  font-size:clamp(2.8rem,6vw,6rem);
  font-weight:bold;
  color:#60a5fa;

  text-shadow:
  0 0 20px rgba(96,165,250,.5),
  0 0 40px rgba(96,165,250,.25);
}

.label{
  margin-top:12px;

  font-size:.9rem;

  text-transform:uppercase;

  letter-spacing:3px;

  color:#cbd5e1;
}

/* =========================
   BARRA PROGRESO
========================= */

.progress-container{
  margin-top:45px;
}

.progress-text{
  margin-bottom:12px;
  color:#cbd5e1;
  letter-spacing:1px;
}

.progress-bar{
  width:100%;
  height:18px;
  border-radius:50px;
  overflow:hidden;

  background:rgba(255,255,255,.08);
}

.progress-fill{
  width:0%;
  height:100%;

  background:linear-gradient(
  to right,
  #2563eb,
  #38bdf8,
  #93c5fd
  );

  border-radius:50px;

  transition:1s ease;
}

/* =========================
   FRASE
========================= */

.quote{
  margin-top:40px;

  font-size:1.1rem;

  color:#dbeafe;

  min-height:30px;

  letter-spacing:1px;
}

/* =========================
   STATS
========================= */

.stats{
  margin-top:40px;

  display:flex;

  justify-content:center;

  gap:25px;

  flex-wrap:wrap;
}

.stat{
  padding:18px 25px;

  border-radius:20px;

  background:rgba(255,255,255,.04);

  border:1px solid rgba(255,255,255,.06);
}

.stat h3{
  color:#60a5fa;
  margin-bottom:6px;
}

.stat p{
  color:#cbd5e1;
}

/* =========================
   BOTONES
========================= */

.buttons{
  margin-top:45px;

  display:flex;

  justify-content:center;

  gap:20px;

  flex-wrap:wrap;
}

button{
  padding:15px 30px;

  border:none;

  border-radius:18px;

  cursor:pointer;

  font-size:1rem;

  font-weight:bold;

  transition:.3s;

  color:white;

  background:linear-gradient(
  to right,
  #2563eb,
  #38bdf8
  );

  box-shadow:0 0 25px rgba(37,99,235,.25);
}

button:hover{
  transform:translateY(-4px) scale(1.03);
}

.danger{
  background:linear-gradient(
  to right,
  #dc2626,
  #ef4444
  );
}

/* =========================
   FOOTER
========================= */

.footer{
  margin-top:35px;
  color:#64748b;
  font-size:.95rem;
}

/* =========================
   RESPONSIVE
========================= */

@media(max-width:768px){

  .container{
    padding:25px;
  }

  .box{
    min-width:130px;
    padding:20px 15px;
  }

  .number{
    font-size:3rem;
  }

}

</style>
</head>
<body>

<!-- =========================
     FONDO
========================= -->

<div class="background">

  <div class="gradient"></div>

  <div class="glow"></div>

  <div class="glow2"></div>

</div>

<!-- =========================
     CONTENIDO
========================= -->

<div class="container">

  <h1>DESINTOXICACIÓN PERFECTA</h1>

  <div class="subtitle">
    100 días de transformación mental
  </div>

  <!-- RELOJ -->

  <div class="timer">

    <div class="box">
      <div class="number" id="days">00</div>
      <div class="label">Días</div>
    </div>

    <div class="box">
      <div class="number" id="hours">00</div>
      <div class="label">Horas</div>
    </div>

    <div class="box">
      <div class="number" id="minutes">00</div>
      <div class="label">Minutos</div>
    </div>

    <div class="box">
      <div class="number" id="seconds">00</div>
      <div class="label">Segundos</div>
    </div>

  </div>

  <!-- PROGRESO -->

  <div class="progress-container">

    <div class="progress-text" id="progressText">
      0% completado
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>

  </div>

  <!-- FRASE -->

  <div class="quote" id="quote">
    Tu mente se está reconstruyendo.
  </div>

  <!-- STATS -->

  <div class="stats">

    <div class="stat">
      <h3 id="currentDay">0</h3>
      <p>Día actual</p>
    </div>

    <div class="stat">
      <h3>100</h3>
      <p>Meta total</p>
    </div>

    <div class="stat">
      <h3 id="remainingDays">100</h3>
      <p>Días restantes</p>
    </div>

  </div>

  <!-- BOTONES -->

  <div class="buttons">

    <button id="startBtn">
      Iniciar desafío
    </button>

    <button class="danger" id="resetBtn">
      Reiniciar
    </button>

  </div>

  <div class="footer">
    Cada segundo cuenta.
  </div>

</div>

<script>

/* =========================
   PARTÍCULAS
========================= */

for(let i = 0; i < 70; i++){

  const particle = document.createElement("div");

  particle.classList.add("particle");

  particle.style.left = Math.random() * 100 + "%";

  particle.style.top = Math.random() * 100 + "%";

  particle.style.animationDuration =
  (Math.random() * 20 + 10) + "s";

  particle.style.opacity = Math.random();

  document.querySelector(".background")
  .appendChild(particle);

}

/* =========================
   FRASES
========================= */

const quotes = [

  "Tu mente se está reconstruyendo.",
  "Cada impulso resistido te fortalece.",
  "Estás recuperando control.",
  "Tu energía está cambiando.",
  "Disciplina > Impulso.",
  "No necesitas dopamina barata.",
  "Estás creando una nueva identidad.",
  "La claridad está regresando.",
  "La mente fuerte nace en silencio.",
  "Cada día suma."
];

/* =========================
   ELEMENTOS
========================= */

const daysEl = document.getElementById("days");
const hoursEl = document.getElementById("hours");
const minutesEl = document.getElementById("minutes");
const secondsEl = document.getElementById("seconds");

const quoteEl = document.getElementById("quote");

const progressFill =
document.getElementById("progressFill");

const progressText =
document.getElementById("progressText");

const currentDay =
document.getElementById("currentDay");

const remainingDays =
document.getElementById("remainingDays");

/* =========================
   FECHAS
========================= */

let startDate = localStorage.getItem("detoxStart");

/* =========================
   BOTON START
========================= */

document.getElementById("startBtn")
.addEventListener("click", () => {

  if(!startDate){

    startDate = new Date();

    localStorage.setItem(
      "detoxStart",
      startDate
    );

    location.reload();

  }

});

/* =========================
   RESET
========================= */

document.getElementById("resetBtn")
.addEventListener("click", () => {

  const confirmReset =
  confirm("¿Seguro que deseas reiniciar el desafío?");

  if(confirmReset){

    localStorage.removeItem("detoxStart");

    location.reload();

  }

});

/* =========================
   RELOJ
========================= */

function updateCountdown(){

  if(!startDate){

    quoteEl.innerText =
    "Presiona 'Iniciar desafío'";

    return;
  }

  const start = new Date(startDate);

  const end = new Date(start);

  end.setDate(end.getDate() + 100);

  const now = new Date();

  const distance = end - now;

  /* TERMINADO */

  if(distance <= 0){

    daysEl.innerText = "00";
    hoursEl.innerText = "00";
    minutesEl.innerText = "00";
    secondsEl.innerText = "00";

    quoteEl.innerText =
    "Has completado los 100 días.";

    progressFill.style.width = "100%";

    progressText.innerText =
    "100% completado";

    return;
  }

  /* TIEMPO */

  const days =
  Math.floor(distance /
  (1000 * 60 * 60 * 24));

  const hours =
  Math.floor(
  (distance % (1000 * 60 * 60 * 24))
  / (1000 * 60 * 60)
  );

  const minutes =
  Math.floor(
  (distance % (1000 * 60 * 60))
  / (1000 * 60)
  );

  const seconds =
  Math.floor(
  (distance % (1000 * 60))
  / 1000
  );

  /* MOSTRAR */

  daysEl.innerText =
  String(days).padStart(2,"0");

  hoursEl.innerText =
  String(hours).padStart(2,"0");

  minutesEl.innerText =
  String(minutes).padStart(2,"0");

  secondsEl.innerText =
  String(seconds).padStart(2,"0");

  /* PROGRESO */

  const totalDuration =
  100 * 24 * 60 * 60 * 1000;

  const passed =
  now - start;

  let progress =
  (passed / totalDuration) * 100;

  if(progress < 0){
    progress = 0;
  }

  if(progress > 100){
    progress = 100;
  }

  progressFill.style.width =
  progress + "%";

  progressText.innerText =
  progress.toFixed(1) + "% completado";

  /* DIA ACTUAL */

  const current =
  Math.floor(passed /
  (1000 * 60 * 60 * 24));

  currentDay.innerText = current;

  remainingDays.innerText = days;

  /* FRASE DINAMICA */

  const quoteIndex =
  current % quotes.length;

  quoteEl.innerText =
  quotes[quoteIndex];

  /* CAMBIO DE ENERGIA */

  if(progress < 30){

    document.body.style.background =
    "#0f172a";

  }

  else if(progress < 70){

    document.body.style.background =
    "#111827";

  }

  else{

    document.body.style.background =
    "#1e293b";

  }

}

/* =========================
   INICIO
========================= */

updateCountdown();

setInterval(updateCountdown,1000);

</script>
</body>
</html>
