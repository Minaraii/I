<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V-Sit System</title>

<style>
:root{
  --bg:#0b0d10;
  --card:#12161c;
  --accent:#00ffcc;
  --text:#e8f0f2;
  --muted:#6b7a86;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family: Inter, Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
  padding:20px;
}

.container{
  max-width:800px;
  margin:auto;
  display:flex;
  flex-direction:column;
  gap:16px;
}

.card{
  background:var(--card);
  border-radius:14px;
  padding:18px;
  border:1px solid rgba(255,255,255,0.04);
}

h1{text-align:center;font-size:1.8rem}
.subtitle{text-align:center;color:var(--muted);font-size:0.85rem}
h2{color:var(--accent);margin-bottom:10px;font-size:1rem}

.block{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.line{
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid rgba(255,255,255,0.05);
  padding:6px 0;
  font-size:0.9rem;
}

.line span{color:var(--muted)}

.big{
  text-align:center;
  font-size:1.4rem;
  margin-top:6px;
}

button{
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:var(--accent);
  color:#000;
  font-weight:bold;
  cursor:pointer;
}

input{
  width:100%;
  margin-top:10px;
  padding:10px;
  border-radius:8px;
  border:none;
  outline:none;
}

</style>
</head>

<body>
<div class="card">
<h1>V-Sit System</h1>
<p class="subtitle">100 días | disciplina | control</p>
<div class="big" id="day"></div>
</div>

<div class="card">
<h2>Protocolo Diario</h2>
<div class="block">
<div class="line">Compresión <span>10–20 reps</span></div>
<div class="line">Pike lifts <span>10 reps</span></div>
<div class="line">L-sit <span>3 sets</span></div>
<div class="line">Intento V-sit <span>3–5</span></div>
<div class="line">Estiramiento <span>5–10 min</span></div>
</div>
</div>

<div class="card">
<h2>Registro</h2>
<input id="note" placeholder="Qué hiciste hoy...">
<button onclick="logDay()">Guardar día</button>
</div>

<div class="card">
<h2>Historial</h2>
<div class="block" id="history"></div>
</div>

</div>

<button onclick="exportData()">Exportar datos</button>

<script>
function getHistory(){
  return JSON.parse(localStorage.getItem("history")) || [];
}

function saveHistory(history){
  localStorage.setItem("history", JSON.stringify(history));
}

function updateDay(){
  let history = getHistory();
  let currentDay = history.length + 1;
  document.getElementById("day").innerText = `Día ${currentDay}/100`;
}

function logDay(){
  let note = document.getElementById("note").value;
  if(note.trim() === "") return;

  let history = getHistory();

  history.push({
    day: history.length + 1,
    note: note
  });

  saveHistory(history);

  document.getElementById("note").value = "";
  renderHistory();
  updateDay();
}

function deleteDay(index){
  let history = getHistory();
  history.splice(index, 1);

  // 🔥 Reordenar días automáticamente
  history = history.map((entry, i) => ({
    day: i + 1,
    note: entry.note
  }));

  saveHistory(history);
  renderHistory();
  updateDay();
}

function editDay(index){
  let history = getHistory();
  let newNote = prompt("Editar día:", history[index].note);

  if(newNote !== null && newNote.trim() !== ""){
    history[index].note = newNote;
    saveHistory(history);
    renderHistory();
  }
}

function renderHistory(){
  let history = getHistory();
  let container = document.getElementById("history");

  container.innerHTML = "";

  history.forEach((entry, index) => {
    let div = document.createElement("div");
    div.className = "line";

    div.innerHTML = `
      Día ${entry.day}
      <span>${entry.note}</span>
      <div>
        <button onclick="editDay(${index})">✏️</button>
        <button onclick="deleteDay(${index})">❌</button>
      </div>
    `;

    container.appendChild(div);
  });
}

// INIT
renderHistory();
updateDay();

// Exportar Datos 
function exportData(){
  let data = localStorage.getItem("history");
  let blob = new Blob([data], {type:"application/json"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "vsit-data.json";
  a.click();
}
</script>
</body>
</html>
